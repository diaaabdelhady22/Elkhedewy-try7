<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شاشة تحميل احترافية</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    background:#000;
    overflow:hidden;
}

/* شاشة التحميل */

.loading-screen{
    width:100%;
    height:100vh;

    background:
    radial-gradient(circle at top left,#111 0%,#000 50%),
    radial-gradient(circle at bottom right,#111 0%,#000 50%);

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

/* المحتوى */

.loader-box{
    position:relative;

    display:flex;
    flex-direction:column;
    align-items:center;

    z-index:2;
}

/* الصورة */

.logo-img{
    width:170px;
    height:170px;

    object-fit:cover;

    border-radius:1000px;

    position:relative;
    z-index:2;

    filter:
    drop-shadow(0 0 20px rgba(255,255,255,0.4));

    margin-bottom:25px;
}

/* الدائرة اللي بتلف */

.ring{
    width:210px;
    height:210px;

    border-radius:50%;

    border:
    3px solid rgba(255,255,255,0.08);

    border-top:
    3px solid white;

    position:absolute;

    top:-20px;

    animation:spin 2s linear infinite;

    z-index:1;

    filter:
    drop-shadow(0 0 15px white);
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

/* العنوان */

.title{
    color:white;

    font-size:38px;
    font-weight:700;

    margin-bottom:8px;

    letter-spacing:1px;
}

/* النص الصغير */

.loading-text{
    color:#999;

    font-size:15px;

    margin-bottom:25px;
}

/* شريط التحميل */

.progress-container{
    width:320px;
    height:7px;

    background:#1a1a1a;

    border-radius:100px;

    overflow:hidden;

    box-shadow:
    0 0 10px rgba(255,255,255,0.06);
}

.progress-bar{
    height:100%;
    width:0%;

    border-radius:100px;

    background:
    linear-gradient(90deg,#fff,#777,#fff);

    animation:load 4s ease-in-out infinite;

    box-shadow:
    0 0 20px rgba(255,255,255,0.7);
}

@keyframes load{

    0%{
        width:0%;
    }

    50%{
        width:75%;
    }

    100%{
        width:100%;
    }

}

/* الجزيئات */

.particle{
    position:absolute;

    width:3px;
    height:3px;

    background:white;

    border-radius:50%;

    opacity:0.4;

    animation:float 8s linear infinite;
}

@keyframes float{

    from{
        transform:translateY(100vh);
        opacity:0;
    }

    to{
        transform:translateY(-100vh);
        opacity:1;
    }

}

</style>
</head>

<body>

<div class="loading-screen">

    <!-- الجزيئات -->

    <div class="particle" style="left:10%; animation-duration:7s;"></div>
    <div class="particle" style="left:20%; animation-duration:9s;"></div>
    <div class="particle" style="left:35%; animation-duration:6s;"></div>
    <div class="particle" style="left:50%; animation-duration:10s;"></div>
    <div class="particle" style="left:65%; animation-duration:8s;"></div>
    <div class="particle" style="left:80%; animation-duration:12s;"></div>
    <div class="particle" style="left:90%; animation-duration:7s;"></div>

    <!-- المحتوى -->

    <div class="loader-box">

        <!-- الدائرة -->
        <div class="ring"></div>

        <!-- الصورة -->
        <img src="logob.png" class="logo-img">

        <!-- النص -->
        <div class="title">
            جاري التحميل
        </div>

        <div class="loading-text">
            الرجاء الانتظار قليلاً...
        </div>

        <!-- البار -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

    </div>

</div>
<script>
setTimeout(function(){
    window.location.href = "code.html";
}, 4000);
</script>

</body>
</html>
